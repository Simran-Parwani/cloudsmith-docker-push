name: Reproduce Cloudsmith Push Slowness

on:
  workflow_dispatch:        # Trigger manually from GitHub Actions UI
    inputs:
      build-no:
        description: "Build number to use"
        required: true
        default: "1"

jobs:
  reproduce-cloudsmith-slowness:
    runs-on: ubuntu-latest

    steps:
      # -------------------------------------------------------
      # Step 1: Checkout the repo
      # -------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # -------------------------------------------------------
      # Step 2: Create dummy artifacts to simulate ~50MB total
      # -------------------------------------------------------
      - name: Create dummy artifacts
        run: |
          mkdir -p ./artifacts/unit-test-artifacts
          mkdir -p ./artifacts/coverity-artifacts
          mkdir -p ./artifacts/integration-test-artifacts
          mkdir -p ./artifacts/firmware-artifacts

          # ~10MB - unit test coverage
          dd if=/dev/urandom bs=1M count=10 of=/tmp/unit-test-dummy
          zip ./artifacts/unit-test-artifacts/unit-test-coverage.zip /tmp/unit-test-dummy

          # ~20MB - coverity (heaviest, matches Suhas's logs)
          dd if=/dev/urandom bs=1M count=20 of=/tmp/coverity-dummy
          zip ./artifacts/coverity-artifacts/coverity.zip /tmp/coverity-dummy

          # ~10MB - integration test coverage
          dd if=/dev/urandom bs=1M count=10 of=/tmp/integration-dummy
          zip ./artifacts/integration-test-artifacts/integration-test-coverage.zip /tmp/integration-dummy

          # ~10MB - firmware
          dd if=/dev/urandom bs=1M count=10 of=/tmp/firmware-dummy
          zip ./artifacts/firmware-artifacts/firmware.zip /tmp/firmware-dummy

          # Small JSON file - build info
          echo '{"component": "test-component", "build": ${{ github.event.inputs.build-no }}, "branch": "develop/1.0.0"}' \
            > ./artifacts/build_info.json

          echo "✅ Dummy artifacts created successfully"

      # -------------------------------------------------------
      # Step 3: Log artifact sizes (for reference)
      # -------------------------------------------------------
      - name: Show artifact sizes
        run: |
          echo "📦 Artifact sizes:"
          du -sh ./artifacts/**/*.zip ./artifacts/build_info.json

      # -------------------------------------------------------
      # Step 4: Push unit-test-coverage.zip ⏱️
      # -------------------------------------------------------
      - name: Push unit-test-coverage.zip
        uses: cloudsmith-io/action@master
        with:
          api-key: ${{ secrets.CLOUDSMITH_API_KEY }}
          command: push
          format: raw
          owner: simran-parwani-testorg
          repo: dockers-testing
          file: ./artifacts/unit-test-artifacts/unit-test-coverage.zip
          name: unit-test-coverage.zip
          version: test-component_1.0.0_build_develop_${{ github.event.inputs.build-no }}
          tags: test-component,develop,1.0.0,${{ github.event.inputs.build-no }},unit-test
          extra_params: "--no-wait-for-sync"

      # -------------------------------------------------------
      # Step 5: Push coverity.zip ⏱️
      # -------------------------------------------------------
      - name: Push coverity.zip
        uses: cloudsmith-io/action@master
        with:
          api-key: ${{ secrets.CLOUDSMITH_API_KEY }}
          command: push
          format: raw
          owner: simran-parwani-testorg
          repo: dockers-testing
          file: ./artifacts/coverity-artifacts/coverity.zip
          name: coverity.zip
          version: test-component_1.0.0_build_develop_${{ github.event.inputs.build-no }}
          tags: test-component,develop,1.0.0,${{ github.event.inputs.build-no }},coverity
          extra_params: "--no-wait-for-sync"

      # -------------------------------------------------------
      # Step 6: Push build_info.json ⏱️
      # -------------------------------------------------------
      - name: Push build_info.json
        uses: cloudsmith-io/action@master
        with:
          api-key: ${{ secrets.CLOUDSMITH_API_KEY }}
          command: push
          format: raw
          owner: simran-parwani-testorg
          repo: dockers-testing
          file: ./artifacts/build_info.json
          name: build_info.json
          version: test-component_1.0.0_build_develop_${{ github.event.inputs.build-no }}
          tags: test-component,develop,1.0.0,${{ github.event.inputs.build-no }},build_info
          extra_params: "--no-wait-for-sync"

      # -------------------------------------------------------
      # Step 7: Push integration-test-coverage.zip ⏱️
      # -------------------------------------------------------
      - name: Push integration-test-coverage.zip
        uses: cloudsmith-io/action@master
        with:
          api-key: ${{ secrets.CLOUDSMITH_API_KEY }}
          command: push
          format: raw
          owner: simran-parwani-testorg
          repo: dockers-testing
          file: ./artifacts/integration-test-artifacts/integration-test-coverage.zip
          name: integration-test-coverage.zip
          version: test-component_1.0.0_build_develop_${{ github.event.inputs.build-no }}
          tags: test-component,develop,1.0.0,${{ github.event.inputs.build-no }}
          extra_params: "--no-wait-for-sync"

      # -------------------------------------------------------
      # Step 8: Push firmware.zip ⏱️
      # -------------------------------------------------------
      - name: Push firmware.zip
        uses: cloudsmith-io/action@master
        with:
          api-key: ${{ secrets.CLOUDSMITH_API_KEY }}
          command: push
          format: raw
          owner: simran-parwani-testorg
          repo: dockers-testing
          file: ./artifacts/firmware-artifacts/firmware.zip
          name: firmware.zip
          version: test-component_1.0.0_build_develop_${{ github.event.inputs.build-no }}
          tags: test-component,develop,1.0.0,${{ github.event.inputs.build-no }}
          extra_params: "--no-wait-for-sync"
