name: Reproduce Cloudsmith Push Slowness

on:
  workflow_dispatch:        # Trigger manually from GitHub Actions UI
    inputs:
      build-no:
        description: "Build number to use"
        required: true
        default: "1"

jobs:
  reproduce-cloudsmith-slowness:
    runs-on: ubuntu-latest

    steps:
      # -------------------------------------------------------
      # Step 1: Checkout the repo
      # -------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # -------------------------------------------------------
      # Step 2: Create 5 dummy artifacts of ~50MB each (~250MB total)
      # -------------------------------------------------------
      - name: Create dummy artifacts
        run: |
          mkdir -p ./artifacts
          for i in 1 2 3 4 5; do
            dd if=/dev/urandom bs=1M count=50 of=/tmp/dummy-50mb-${i}
            zip ./artifacts/dummy-50mb-${i}.zip /tmp/dummy-50mb-${i}
            echo "✅ Created dummy-50mb-${i}.zip"
          done
          # Small JSON file - build info
          echo '{"component": "test-component", "build": ${{ github.event.inputs.build-no }}, "branch": "develop/1.0.0"}' \
            > ./artifacts/build_info.json
          echo "✅ All dummy artifacts created successfully"

      # -------------------------------------------------------
      # Step 3: Log artifact sizes (for reference)
      # -------------------------------------------------------
      - name: Show artifact sizes
        run: |
          echo "📦 Artifact sizes:"
          du -sh ./artifacts/*.zip ./artifacts/build_info.json

      # -------------------------------------------------------
      # Step 4: Push dummy-50mb-1.zip ⏱️
      # -------------------------------------------------------
      - name: Push dummy-50mb-1.zip
        uses: cloudsmith-io/action@master
        with:
          api-key: ${{ secrets.CLOUDSMITH_API_KEY }}
          command: push
          format: raw
          owner: simran-parwani-testorg
          repo: dockers-testing
          file: ./artifacts/dummy-50mb-1.zip
          name: dummy-50mb-1.zip
          version: test-component_1.0.0_build_develop_${{ github.event.inputs.build-no }}
          tags: test-component,develop,1.0.0,${{ github.event.inputs.build-no }},dummy-50mb-1
          no-wait-for-sync: "true"

      # -------------------------------------------------------
      # Step 5: Push dummy-50mb-2.zip ⏱️
      # -------------------------------------------------------
      - name: Push dummy-50mb-2.zip
        uses: cloudsmith-io/action@master
        with:
          api-key: ${{ secrets.CLOUDSMITH_API_KEY }}
          command: push
          format: raw
          owner: simran-parwani-testorg
          repo: dockers-testing
          file: ./artifacts/dummy-50mb-2.zip
          name: dummy-50mb-2.zip
          version: test-component_1.0.0_build_develop_${{ github.event.inputs.build-no }}
          tags: test-component,develop,1.0.0,${{ github.event.inputs.build-no }},dummy-50mb-2
          no-wait-for-sync: "true"

      # -------------------------------------------------------
      # Step 6: Push dummy-50mb-3.zip ⏱️
      # -------------------------------------------------------
      - name: Push dummy-50mb-3.zip
        uses: cloudsmith-io/action@master
        with:
          api-key: ${{ secrets.CLOUDSMITH_API_KEY }}
          command: push
          format: raw
          owner: simran-parwani-testorg
          repo: dockers-testing
          file: ./artifacts/dummy-50mb-3.zip
          name: dummy-50mb-3.zip
          version: test-component_1.0.0_build_develop_${{ github.event.inputs.build-no }}
          tags: test-component,develop,1.0.0,${{ github.event.inputs.build-no }},dummy-50mb-3
          no-wait-for-sync: "true"

      # -------------------------------------------------------
      # Step 7: Push dummy-50mb-4.zip ⏱️
      # -------------------------------------------------------
      - name: Push dummy-50mb-4.zip
        uses: cloudsmith-io/action@master
        with:
          api-key: ${{ secrets.CLOUDSMITH_API_KEY }}
          command: push
          format: raw
          owner: simran-parwani-testorg
          repo: dockers-testing
          file: ./artifacts/dummy-50mb-4.zip
          name: dummy-50mb-4.zip
          version: test-component_1.0.0_build_develop_${{ github.event.inputs.build-no }}
          tags: test-component,develop,1.0.0,${{ github.event.inputs.build-no }},dummy-50mb-4
          no-wait-for-sync: "true"

      # -------------------------------------------------------
      # Step 8: Push dummy-50mb-5.zip ⏱️
      # -------------------------------------------------------
      - name: Push dummy-50mb-5.zip
        uses: cloudsmith-io/action@master
        with:
          api-key: ${{ secrets.CLOUDSMITH_API_KEY }}
          command: push
          format: raw
          owner: simran-parwani-testorg
          repo: dockers-testing
          file: ./artifacts/dummy-50mb-5.zip
          name: dummy-50mb-5.zip
          version: test-component_1.0.0_build_develop_${{ github.event.inputs.build-no }}
          tags: test-component,develop,1.0.0,${{ github.event.inputs.build-no }},dummy-50mb-5
          no-wait-for-sync: "true"

      # -------------------------------------------------------
      # Step 9: Push build_info.json ⏱️
      # -------------------------------------------------------
      - name: Push build_info.json
        uses: cloudsmith-io/action@master
        with:
          api-key: ${{ secrets.CLOUDSMITH_API_KEY }}
          command: push
          format: raw
          owner: simran-parwani-testorg
          repo: dockers-testing
          file: ./artifacts/build_info.json
          name: build_info.json
          version: test-component_1.0.0_build_develop_${{ github.event.inputs.build-no }}
          tags: test-component,develop,1.0.0,${{ github.event.inputs.build-no }},build_info
          no-wait-for-sync: "true"
